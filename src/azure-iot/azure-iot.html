<script type="text/html" data-help-name="azure-iot-device-receiver">
    <p>Connects to an Azure IoT Hub device endpoint and receives cloud-to-device messages using the configured protocol.</p>

    <h3>Inputs</h3>
    <p>This node has no inputs. It emits a message whenever a cloud-to-device message is received.</p>

    <h3>Outputs</h3>
    <ol class="node-ports">
        <li>Received message
            <dl class="message-properties">
                <dt>payload <span class="property-type">buffer | string | object</span></dt>
                <dd>The message body returned from Azure IoT.</dd>

                <dt>properties <span class="property-type">array</span></dt>
                <dd>User/system properties from the received message.</dd>
            </dl>
        </li>
    </ol>

    <h3>Details</h3>
    <p>Configure the node with your device connection details:</p>
    <ul>
        <li><b>Protocol</b>: One of <code>http</code>, <code>amqp</code>, <code>mqtt</code>, <code>amqpWs</code>.</li>
        <li><b>Hostname</b>: Your IoT Hub host name (<code>*.azure-devices.net</code>).</li>
        <li><b>Device Id</b>: The IoT Hub device identity.</li>
        <li><b>SAS Key</b>: The device SAS key used to authenticate.</li>
    </ul>

    <p>When a message is received, the node outputs the payload including the properties.</p>

    <p><b>Node status</b> indicates the current state:</p>
    <ul>
        <li><code>connected</code> - connected to IoT Hub and waiting for messages</li>
        <li><code>received</code> - a message has been received and emitted</li>
        <li><code>error</code> - an error occurred</li>
        <li><code>disconnected</code> - not connected / connection closed</li>
    </ul>

    <h3>References</h3>
    <ul>
        <li><a href="https://learn.microsoft.com/azure/iot-hub/" target="_blank"> Azure IoT Hub documentation</a></li>
        <li><a href="https://github.com/Azure/azure-iot-sdk-node" target="_blank"> Azure IoT SDK for Node.js</a></li>
        <li><a href="https://github.com/nkaaf/node-red-azure-iot" target="_blank"> This nodes GitHub repository</a></li>
    </ul>
</script>

<script type="text/html" data-help-name="azure-iot-device-transmitter">
    <p>Sends device-to-cloud messages to an Azure IoT Hub using the configured device credentials. Connection settings can be defined in the node configuration or provided dynamically on each input message.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | buffer | object</span></dt>
        <dd>The message body to send to Azure IoT Hub. If an object is provided, it is sent as JSON.</dd>

        <dt class="optional">protocol <span class="property-type">string</span></dt>
        <dd>Required if the node’s <b>Protocol</b> is set to <i>Defined in message</i>. One of: <code>http</code>, <code>amqp</code>, <code>mqtt</code>, <code>amqpWs</code>.</dd>

        <dt class="optional">hostname <span class="property-type">string</span></dt>
        <dd>Required if <b>Hostname</b> is left blank in the node configuration (<code>*.azure-devices.net</code>).</dd>

        <dt class="optional">deviceId <span class="property-type">string</span></dt>
        <dd>Required if <b>Device Id</b> is left blank in the node configuration.</dd>

        <dt class="optional">sasKey <span class="property-type">string</span></dt>
        <dd>Required if <b>SAS Key</b> is left blank in the node configuration.</dd>

        <dt class="optional">properties <span class="property-type">object</span></dt>
        <dd>Optional application properties to attach to the outgoing IoT message.</dd>
    </dl>

    <h3>Outputs</h3>
    <ol class="node-ports">
        <li>Send result
            <dl class="message-properties">
                <dt>payload <span class="property-type">string</span></dt>
                <dd>Confirmation text: <code>"Message sent."</code></dd>
            </dl>
        </li>
    </ol>

    <h3>Details</h3>
    <p>The node uses the values configured in the edit dialog unless they are left blank. If a value is blank (or protocol is set to <i>Defined in message</i>), it will be taken from the incoming message.</p>

    <p><b>Configuration precedence</b>:</p>
    <ul>
        <li>If a node field is set (non-empty), it is used.</li>
        <li>Otherwise the value must be provided on <code>msg</code> (for example <code>msg.hostname</code>).</li>
    </ul>

    <p><b>Node status</b> reflects the connection/sending state and may show states such as <code>connected</code>, <code>sent</code>, <code>error</code>, and <code>disconnected</code>.</p>

    <h3>References</h3>
    <ul>
        <li><a href="https://learn.microsoft.com/azure/iot-hub/" target="_blank"> Azure IoT Hub documentation</a></li>
        <li><a href="https://github.com/Azure/azure-iot-sdk-node" target="_blank"> Azure IoT SDK for Node.js</a></li>
        <li><a href="https://github.com/nkaaf/node-red-azure-iot" target="_blank"> This nodes GitHub repository</a></li>
    </ul>
</script>

<script type="text/html" data-help-name="azure-iot-hub-receiver">
    <p>Receives device-to-cloud telemetry/events from an Azure IoT Hub via the Event Hub compatible endpoint.</p>

    <h3>Inputs</h3>
    <p>This node has no inputs. It outputs a message for every event received.</p>

    <h3>Outputs</h3>
    <ol class="node-ports">
        <li>Received event
            <dl class="message-properties">
                <dt>payload <span class="property-type">any</span></dt>
                <dd>The event body (<code>event.body</code>).</dd>

                <dt class="optional">custom_properties <span class="property-type">object</span></dt>
                <dd>Custom/application properties (<code>event.properties</code>).</dd>

                <dt class="optional">system_properties <span class="property-type">object</span></dt>
                <dd>System properties (<code>event.systemProperties</code>).</dd>

                <dt class="optional">correlation_id <span class="property-type">string</span></dt>
                <dd>The correlation id (<code>event.correlationId</code>).</dd>

                <dt class="optional">message_id <span class="property-type">string</span></dt>
                <dd>The message id (<code>event.messageId</code>).</dd>
            </dl>
        </li>
    </ol>

    <h3>Details</h3>
    <p>Configure the node with:</p>
    <ul>
        <li><b>Connection String</b> - IoT Hub/Event Hub compatible connection string.</li>
        <li><b>Consumer Group</b> - The Event Hub consumer group (often <code>$Default</code>).</li>
        <li><b>Event Hub Name</b> - Optional. If provided, overrides the default Event Hub compatible name.</li>
    </ul>

    <p>The node status reflects the connection state (for example: <code>connected</code>, <code>receiving</code>, <code>error</code>, <code>disconnected</code>).</p>

    <h3>References</h3>
    <ul>
        <li><a href="https://learn.microsoft.com/azure/iot-hub/" target="_blank"> Azure IoT Hub documentation</a></li>
        <li><a href="https://github.com/Azure/azure-iot-sdk-node" target="_blank"> Azure IoT SDK for Node.js</a></li>
        <li><a href="https://github.com/nkaaf/node-red-azure-iot" target="_blank"> This nodes GitHub repository</a></li>
    </ul>
</script>
